<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Employee</title>
    <link rel="stylesheet" th:href="@{/css/updateEmployee.css}">
</head>

<body>

<form th:action="@{/employees/update/{id}(id=${emp.id})}"
      th:object="${emp}"
      method="post">
    <h2>Update Employee</h2>
    <input type="text" th:field="*{name}" />
    <input type="text" th:field="*{dept}" />

    <button type="submit" class="submit">Update</button>

</form>

</body>
</html>
